version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agency_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agencydashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: agency_server
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/agencydashboard?schema=public
      JWT_ACCESS_SECRET: super_secret_access_key_change_in_production_32chars
      JWT_REFRESH_SECRET: super_secret_refresh_key_change_in_production_32chars
      ACCESS_TOKEN_EXPIRY: 15m
      REFRESH_TOKEN_EXPIRY: 7d
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      NODE_ENV: development
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    command: sh -c "npx prisma db push && npm run dev"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: agency_client
    restart: always
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_SOCKET_URL: http://localhost:5000
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data: